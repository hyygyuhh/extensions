<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mineradio Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    font: 13px/1.5 "Segoe UI", "PingFang SC", sans-serif;
    color: #e8ecef;
    background: linear-gradient(160deg, #0a1014 0%, #101820 100%);
    padding: 14px;
  }
  h1 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #00f5d4; }
  .sub { color: #8a9099; font-size: 12px; margin-bottom: 12px; }
  .card {
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: rgba(255,255,255,.03);
  }
  .row { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.08);
    object-fit: cover; flex: 0 0 36px;
  }
  .name { font-weight: 600; font-size: 13px; }
  .meta { color: #8a9099; font-size: 11px; margin-top: 2px; }
  .ok { color: #00f5d4; }
  .warn { color: #f4d28a; }
  .bad { color: #ff7a86; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .card.kg .name { color: #9fefff; }
  button, a.btn {
    display: flex; align-items: center; justify-content: center;
    height: 34px; border-radius: 10px; border: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.05); color: #e8ecef; text-decoration: none;
    font: inherit; cursor: pointer;
  }
  button:hover, a.btn:hover { border-color: rgba(0,245,212,.35); color: #fff; }
  .foot { margin-top: 10px; color: #66707a; font-size: 11px; text-align: center; }
</style>
</head>
<body>
  <h1>Mineradio Bridge</h1>
  <div class="sub">本地音乐 API 代理 · <span id="ver">v1.4.0</span></div>

  <div class="card" id="netease-card">
    <div class="row">
      <img class="avatar" id="ne-avatar" alt="" hidden>
      <div>
        <div class="name">网易云音乐</div>
        <div class="meta" id="ne-status">检测中…</div>
      </div>
    </div>
  </div>

  <div class="card" id="qq-card">
    <div class="row">
      <img class="avatar" id="qq-avatar" alt="" hidden>
      <div>
        <div class="name">QQ 音乐</div>
        <div class="meta" id="qq-status">检测中…</div>
      </div>
    </div>
  </div>

  <div class="card" id="kg-card">
    <div class="row">
      <img class="avatar" id="kg-avatar" alt="" hidden>
      <div>
        <div class="name">酷狗音乐</div>
        <div class="meta" id="kg-status">检测中…</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <a class="btn" href="https://music.163.com/" target="_blank" rel="noreferrer">打开网易云</a>
    <a class="btn" href="https://y.qq.com/" target="_blank" rel="noreferrer">打开 QQ 音乐</a>
    <a class="btn" href="https://www.kugou.com/" target="_blank" rel="noreferrer">打开酷狗</a>
    <button id="refresh" type="button">刷新状态</button>
    <a class="btn" href="https://mineradio.art/" target="_blank" rel="noreferrer">打开网页版</a>
    <a class="btn" href="https://mineradio.cn/" target="_blank" rel="noreferrer">打开官网</a>
  </div>

  <div class="foot">Cookie 仅在本机使用，不会上传服务器</div>
  <script src="popup.js"></script>
</body>
</html>
