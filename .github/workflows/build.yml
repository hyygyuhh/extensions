name: Build extensions
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build extensions with bepp
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install bepp globally
        run: npm install -g @bepp/bepp

      - name: Build Chrome extension
        run: bepp build-chrome --input ./ --id mineradio-bridge

      - name: Build Edge extension
        run: bepp build-edge --input ./ --id mineradio-bridge

      - name: Build Firefox extension
        run: bepp build-firefox --input ./ --id mineradio-bridge

      - name: Build Brave extension
        run: bepp build-brave --input ./ --id mineradio-bridge

      - name: Build Opera extension
        run: bepp build-opera --input ./ --id mineradio-bridge

      - name: Build Safari extension
        run: bepp build-safari --input ./ --id mineradio-bridge --app-id com.mineradio.bridge --app-title "Mineradio Bridge"

      - name: List all build results
        run: ls -la build/extensions/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions-build
          path: build/extensions/
