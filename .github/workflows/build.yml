name: Build extensions
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build extensions with bepp
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install bepp globally
        run: npm install -g @bepp/bepp

      - name: Build extension with BEPP
        run: bepp build

      - name: List build results
        run: ls -la build/extensions/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extensions-build
          path: build/extensions/
